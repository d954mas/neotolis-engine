name: CI

on: [push, pull_request]

jobs:
  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read emsdk version
        id: emsdk-version
        run: echo "version=$(cat .emsdk-version)" >> $GITHUB_OUTPUT

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ steps.emsdk-version.outputs.version }}
          actions-cache-folder: 'emsdk-cache'

      - name: Configure WASM debug
        run: emcmake cmake --preset wasm-debug

      - name: Build WASM debug
        run: cmake --build --preset wasm-debug

      - name: Verify WASM debug output
        run: |
          test -f build/examples/hello/wasm-debug/index.html
          test -f build/examples/hello/wasm-debug/index.js
          test -f build/examples/hello/wasm-debug/index.wasm
          test -f build/engine/wasm-debug/libnt_core.a
          test -f build/engine/wasm-debug/libnt_log.a
          test -f build/engine/wasm-debug/libnt_log_stub.a
          echo "WASM debug build verified"

      - name: Configure WASM release
        run: emcmake cmake --preset wasm-release

      - name: Build WASM release
        run: cmake --build --preset wasm-release

      - name: Verify WASM release output
        run: |
          test -f build/examples/hello/wasm-release/index.html
          test -f build/examples/hello/wasm-release/index.js
          test -f build/examples/hello/wasm-release/index.wasm
          test -f build/engine/wasm-release/libnt_core.a
          test -f build/engine/wasm-release/libnt_log.a
          test -f build/engine/wasm-release/libnt_log_stub.a
          echo "WASM release build verified"

  native-build:
    name: Native Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang ninja-build

      - name: Configure native debug
        run: cmake --preset native-debug

      - name: Build native debug
        run: cmake --build --preset native-debug

      - name: Verify native debug output
        run: |
          test -f build/tools/builder/native-debug/builder
          test -f build/engine/native-debug/libnt_core.a
          test -f build/engine/native-debug/libnt_log.a
          test -f build/engine/native-debug/libnt_log_stub.a
          echo "Native debug build verified"

      - name: Smoke test builder (debug)
        run: ./build/tools/builder/native-debug/builder

      - name: Configure native release
        run: cmake --preset native-release

      - name: Build native release
        run: cmake --build --preset native-release

      - name: Verify native release output
        run: |
          test -f build/tools/builder/native-release/builder
          test -f build/engine/native-release/libnt_core.a
          test -f build/engine/native-release/libnt_log.a
          test -f build/engine/native-release/libnt_log_stub.a
          echo "Native release build verified"

      - name: Smoke test builder (release)
        run: ./build/tools/builder/native-release/builder

      - name: Submodule consumption test
        run: |
          cmake -S tests/submodule -B build/submodule-test \
            -DENGINE_ROOT=${{ github.workspace }} \
            -DCMAKE_C_COMPILER=clang -G Ninja
          cmake --build build/submodule-test
          ./build/submodule-test/submodule_test

  test-native:
    name: Native Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang ninja-build

      - name: Configure
        run: cmake --preset native-debug

      - name: Build
        run: cmake --build --preset native-debug

      - name: Run tests
        run: ctest --preset native-debug

  test-wasm:
    name: WASM Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read emsdk version
        id: emsdk-version
        run: echo "version=$(cat .emsdk-version)" >> $GITHUB_OUTPUT

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ steps.emsdk-version.outputs.version }}
          actions-cache-folder: 'emsdk-cache'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure WASM debug
        run: emcmake cmake --preset wasm-debug

      - name: Build WASM debug
        run: cmake --build --preset wasm-debug

      - name: Run WASM smoke test (debug)
        run: node tests/wasm/smoke_test.js wasm-debug

      - name: Configure WASM release
        run: emcmake cmake --preset wasm-release

      - name: Build WASM release
        run: cmake --build --preset wasm-release

      - name: Run WASM smoke test (release)
        run: node tests/wasm/smoke_test.js wasm-release

  tidy-check:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang clang-tidy ninja-build

      - name: Configure
        run: cmake --preset native-debug

      - name: Run clang-tidy
        run: bash scripts/tidy.sh build/_cmake/native-debug

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find engine shared tools examples -name '*.c' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror

  size-track:
    name: Track Build Size
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read emsdk version
        id: emsdk-version
        run: echo "version=$(cat .emsdk-version)" >> $GITHUB_OUTPUT

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ steps.emsdk-version.outputs.version }}
          actions-cache-folder: 'emsdk-cache'

      - name: Configure WASM release
        run: emcmake cmake --preset wasm-release

      - name: Build WASM release
        run: cmake --build --preset wasm-release

      - name: Measure sizes
        run: bash scripts/size.sh hello --json > /tmp/size_entry.json

      - name: Install wabt
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Configure WASM analysis
        run: emcmake cmake --preset wasm-analysis

      - name: Build WASM analysis
        run: cmake --build --preset wasm-analysis

      - name: Generate size report
        run: set -o pipefail && bash scripts/size-report.sh hello | tee /tmp/size-report.txt

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-data
        continue-on-error: true

      - name: Ensure gh-pages data directory exists
        run: mkdir -p gh-pages-data/sizes

      - name: Copy size report to gh-pages
        run: |
          mkdir -p gh-pages-data/reports/hello
          cp /tmp/size-report.txt gh-pages-data/reports/hello/size-report.txt

      - name: Update size history
        run: |
          TARGET_FILE="gh-pages-data/sizes/hello.json"
          ENTRY=$(cat /tmp/size_entry.json)
          if [ -f "$TARGET_FILE" ]; then
            jq --argjson e "$ENTRY" '. += [$e]' "$TARGET_FILE" > /tmp/updated.json
            mv /tmp/updated.json "$TARGET_FILE"
          else
            echo "[$ENTRY]" > "$TARGET_FILE"
          fi

      - name: Check for size regression
        run: |
          TARGET_FILE="gh-pages-data/sizes/hello.json"
          ENTRIES=$(jq length "$TARGET_FILE")
          if [ "$ENTRIES" -gt 1 ]; then
            PREV=$(jq '.[-2].total.raw' "$TARGET_FILE")
            CURR=$(jq '.[-1].total.raw' "$TARGET_FILE")
            if [ "$PREV" -gt 0 ]; then
              GROWTH=$(( (CURR - PREV) * 100 / PREV ))
              if [ "$GROWTH" -gt 10 ]; then
                echo "::warning::WASM output size grew by ${GROWTH}% (${PREV}B -> ${CURR}B)"
              else
                echo "Size change: ${GROWTH}% (${PREV}B -> ${CURR}B)"
              fi
            fi
          fi

      - name: Preserve old size chart page
        run: |
          if [ -f "gh-pages-data/index.html" ] && ! [ -d "gh-pages-data/_astro" ]; then
            mkdir -p gh-pages-data/sizes
            cp gh-pages-data/index.html gh-pages-data/sizes/index.html
          fi

      - name: Copy WASM examples to gh-pages
        run: |
          for example_dir in build/examples/*/wasm-release; do
            example_name=$(basename $(dirname "$example_dir"))
            mkdir -p "gh-pages-data/wasm/$example_name"
            cp "$example_dir"/*.html "$example_dir"/*.js "$example_dir"/*.wasm "gh-pages-data/wasm/$example_name/"
          done

      - name: Copy example cover images
        run: |
          for promo_dir in examples/*/site_promo; do
            example_name=$(basename $(dirname "$promo_dir"))
            if [ -f "$promo_dir/cover.png" ]; then
              mkdir -p "gh-pages-data/examples/$example_name"
              cp "$promo_dir/cover.png" "gh-pages-data/examples/$example_name/cover.png"
            fi
          done

      - name: Build promo site
        run: |
          cd neotolis-engine-site
          npm install
          npm run build

      - name: Copy site to gh-pages
        run: cp -r neotolis-engine-site/dist/* gh-pages-data/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-data
          keep_files: true

  pr-size-comment:
    name: PR Size Comment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Read emsdk version
        id: emsdk-version
        run: echo "version=$(cat .emsdk-version)" >> $GITHUB_OUTPUT

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ steps.emsdk-version.outputs.version }}
          actions-cache-folder: 'emsdk-cache'

      - name: Install wabt
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Configure WASM release
        run: emcmake cmake --preset wasm-release

      - name: Build WASM release
        run: cmake --build --preset wasm-release

      - name: Measure sizes
        run: bash scripts/size.sh hello --json > /tmp/pr_size.json

      - name: Configure WASM analysis
        run: emcmake cmake --preset wasm-analysis

      - name: Build WASM analysis
        run: cmake --build --preset wasm-analysis

      - name: Generate size report
        run: set -o pipefail && bash scripts/size-report.sh hello | tee /tmp/pr-report.txt

      - name: Fetch baseline from gh-pages
        id: baseline
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-baseline
        continue-on-error: true

      - name: Check for baseline report
        id: baseline-report
        run: |
          if [ -f "gh-pages-baseline/reports/hello/size-report.txt" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate size comment
        run: |
          CURRENT=$(cat /tmp/pr_size.json)
          BASELINE_FILE="gh-pages-baseline/sizes/hello.json"
          HAS_BASELINE=false
          if [ -f "$BASELINE_FILE" ]; then
            BASELINE=$(jq '.[-1]' "$BASELINE_FILE")
            HAS_BASELINE=true
          fi

          {
            echo "## WASM Build Size (\`hello\`)"
            echo ""
            echo "| File | Raw | Gzip | Raw Delta | Gzip Delta |"
            echo "|------|----:|-----:|----------:|-----------:|"

            for fname in $(echo "$CURRENT" | jq -r '.files | keys[]' | sort); do
              cur_raw=$(echo "$CURRENT" | jq -r ".files[\"$fname\"].raw")
              cur_gz=$(echo "$CURRENT" | jq -r ".files[\"$fname\"].gzip")
              if [ "$HAS_BASELINE" = true ]; then
                base_raw=$(echo "$BASELINE" | jq -r ".files[\"$fname\"].raw // 0")
                base_gz=$(echo "$BASELINE" | jq -r ".files[\"$fname\"].gzip // 0")
                d_raw=$((cur_raw - base_raw))
                d_gz=$((cur_gz - base_gz))
                [ "$d_raw" -ge 0 ] && d_raw_str="+${d_raw} B" || d_raw_str="${d_raw} B"
                [ "$d_gz" -ge 0 ] && d_gz_str="+${d_gz} B" || d_gz_str="${d_gz} B"
              else
                d_raw_str="--"
                d_gz_str="--"
              fi
              printf "| \`%s\` | %d B | %d B | %s | %s |\n" "$fname" "$cur_raw" "$cur_gz" "$d_raw_str" "$d_gz_str"
            done

            cur_total_raw=$(echo "$CURRENT" | jq -r '.total.raw')
            cur_total_gz=$(echo "$CURRENT" | jq -r '.total.gzip')
            if [ "$HAS_BASELINE" = true ]; then
              base_total_raw=$(echo "$BASELINE" | jq -r '.total.raw')
              base_total_gz=$(echo "$BASELINE" | jq -r '.total.gzip')
              d_total_raw=$((cur_total_raw - base_total_raw))
              d_total_gz=$((cur_total_gz - base_total_gz))
              [ "$d_total_raw" -ge 0 ] && d_total_raw_str="+${d_total_raw} B" || d_total_raw_str="${d_total_raw} B"
              [ "$d_total_gz" -ge 0 ] && d_total_gz_str="+${d_total_gz} B" || d_total_gz_str="${d_total_gz} B"
            else
              d_total_raw_str="--"
              d_total_gz_str="--"
            fi
            echo "| **Total** | **${cur_total_raw} B** | **${cur_total_gz} B** | **${d_total_raw_str}** | **${d_total_gz_str}** |"

            echo ""
            pr_commit=$(echo "$CURRENT" | jq -r '.commit')
            if [ "$HAS_BASELINE" = true ]; then
              base_commit=$(echo "$BASELINE" | jq -r '.commit')
            else
              base_commit="none"
            fi
            echo "<sub>Baseline: master@${base_commit} | PR: ${pr_commit}</sub>"
          } > /tmp/pr_comment.md

      - name: Post PR size comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_BODY=$(cat /tmp/pr_comment.md)
          PR_NUMBER=${{ github.event.pull_request.number }}

          gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            -X POST -f body="$COMMENT_BODY"
          echo "Created size comment"

      - name: Generate size report comment
        run: |
          PR_REPORT="/tmp/pr-report.txt"
          BASE_REPORT="gh-pages-baseline/reports/hello/size-report.txt"
          HAS_BASELINE="${{ steps.baseline-report.outputs.exists }}"

          {
            echo "## WASM Size Report (\`hello\`)"
            echo ""

            if [ "$HAS_BASELINE" = "true" ]; then
              echo "<details>"
              echo "<summary>Size Report Diff (Master | PR | Delta)</summary>"
              echo ""
              echo '```diff'

              # Generate a unified diff of the two reports
              diff --unified=1000 "$BASE_REPORT" "$PR_REPORT" | tail -n +4 || true

              echo '```'
              echo "</details>"
              echo ""

              # Show a summary of key section changes inline
              echo "### Key Changes"
              echo ""

              # Extract section sizes from both reports and show delta
              echo "| Section | Master | PR | Delta |"
              echo "|---------|-------:|---:|------:|"

              awk '
              BEGIN { mode=0 }
              FILENAME==ARGV[1] && /^## WASM Section Sizes/ { mode=1; next }
              FILENAME==ARGV[1] && mode==1 && /^##/ { mode=0 }
              FILENAME==ARGV[1] && mode==1 && /^[A-Za-z]/ && !/^Section/ && !/^---/ {
                name=$1; size=$(NF-1); base[name]=size
              }
              FILENAME==ARGV[2] && /^## WASM Section Sizes/ { mode=1; next }
              FILENAME==ARGV[2] && mode==1 && /^##/ { mode=0 }
              FILENAME==ARGV[2] && mode==1 && /^[A-Za-z]/ && !/^Section/ && !/^---/ {
                name=$1; size=$(NF-1); pr[name]=size
                if (name in base) {
                  delta = size - base[name]
                  if (delta > 0) prefix = "+"
                  else prefix = ""
                  printf "| %s | %d B | %d B | %s%d B |\n", name, base[name], size, prefix, delta
                } else {
                  printf "| %s | (new) | %d B | -- |\n", name, size
                }
              }
              END {
                for (name in base) {
                  if (!(name in pr)) {
                    printf "| %s | %d B | (removed) | -- |\n", name, base[name]
                  }
                }
              }
              ' "$BASE_REPORT" "$PR_REPORT"

              echo ""

              # Top functions diff: show functions that changed
              echo "| Function | Master | PR | Delta |"
              echo "|----------|-------:|---:|------:|"

              awk '
              BEGIN { mode_base=0; mode_pr=0 }
              FILENAME==ARGV[1] && /^## Top.*Functions/ { mode_base=1; next }
              FILENAME==ARGV[1] && mode_base==1 && /^##/ { mode_base=0 }
              FILENAME==ARGV[1] && mode_base==1 && /^ *[0-9]+ B / {
                size=$1; name=""; for(i=3;i<=NF;i++) name=name (i>3?" ":"") $i
                base_fn[name]=size
              }
              FILENAME==ARGV[2] && /^## Top.*Functions/ { mode_pr=1; next }
              FILENAME==ARGV[2] && mode_pr==1 && /^##/ { mode_pr=0 }
              FILENAME==ARGV[2] && mode_pr==1 && /^ *[0-9]+ B / {
                size=$1; name=""; for(i=3;i<=NF;i++) name=name (i>3?" ":"") $i
                pr_fn[name]=size
                if (name in base_fn) {
                  delta = size - base_fn[name]
                  if (delta != 0) {
                    if (delta > 0) prefix = "+"
                    else prefix = ""
                    printf "| `%s` | %d B | %d B | %s%d B |\n", name, base_fn[name], size, prefix, delta
                  }
                } else {
                  printf "| `%s` | (new) | %d B | -- |\n", name, size
                }
              }
              END {
                for (name in base_fn) {
                  if (!(name in pr_fn)) {
                    printf "| `%s` | %d B | (removed) | -- |\n", name, base_fn[name]
                  }
                }
              }
              ' "$BASE_REPORT" "$PR_REPORT"

            else
              # No baseline -- show full report without diff
              echo "<details>"
              echo "<summary>Size Report (no baseline available)</summary>"
              echo ""
              echo '```'
              cat "$PR_REPORT"
              echo '```'
              echo "</details>"
            fi

            echo ""
            pr_commit=$(git rev-parse --short HEAD)
            echo "<sub>PR: ${pr_commit} | Baseline: $( [ "$HAS_BASELINE" = "true" ] && head -2 "$BASE_REPORT" | grep '# Commit:' | awk '{print $3}' || echo 'none' )</sub>"

          } > /tmp/report_comment.md

      - name: Post size report comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_BODY=$(cat /tmp/report_comment.md)
          PR_NUMBER=${{ github.event.pull_request.number }}

          gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            -X POST -f body="$COMMENT_BODY"
          echo "Created size report comment"
