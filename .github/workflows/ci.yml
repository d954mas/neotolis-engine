name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'README.md'
      - 'CLAUDE.md'
      - 'AGENTS.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'README.md'
      - 'CLAUDE.md'
      - 'AGENTS.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wasm:
    name: WASM Build & Test
    runs-on: ubuntu-latest
    needs: native
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Read emsdk version
        id: emsdk-version
        run: echo "version=$(cat .emsdk-version)" >> $GITHUB_OUTPUT

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ steps.emsdk-version.outputs.version }}
          actions-cache-folder: 'emsdk-cache'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download textured_quad packs
        uses: actions/download-artifact@v4
        with:
          name: tq-packs
          path: build/examples/textured_quad

      - name: Download sponza packs
        uses: actions/download-artifact@v4
        with:
          name: sponza-packs
          path: build/examples/sponza

      - name: Build baseline WASM debug artifacts
        run: |
          emcmake cmake --preset wasm-debug
          cmake --build --preset wasm-debug

      - name: Verify baseline WASM debug output
        run: |
          test -f build/examples/hello/wasm-debug/index.html
          test -f build/examples/hello/wasm-debug/index.js
          test -f build/examples/hello/wasm-debug/index.wasm
          test -f build/engine/wasm-debug/libnt_core.a
          test -f build/engine/wasm-debug/libnt_log.a
          test -f build/engine/wasm-debug/libnt_log_stub.a
          echo "Baseline WASM debug build verified"

      - name: Run SIMD loader test
        run: node tests/wasm/simd_loader_test.js

      - name: Run baseline WASM smoke test (debug)
        run: node tests/wasm/smoke_test.js wasm-debug

      - name: Run baseline WASM debug ctest
        run: ctest --preset wasm-debug

      - name: Build standalone WASM debug SIMD artifacts
        run: |
          emcmake cmake --preset wasm-debug-simd
          cmake --build --preset wasm-debug-simd

      - name: Verify standalone WASM debug SIMD output
        run: |
          test -f build/examples/hello/wasm-debug-simd/index.html
          test -f build/examples/hello/wasm-debug-simd/index.js
          test -f build/examples/hello/wasm-debug-simd/index.wasm
          test -f build/engine/wasm-debug-simd/libnt_core.a
          test -f build/engine/wasm-debug-simd/libnt_log.a
          test -f build/engine/wasm-debug-simd/libnt_log_stub.a
          echo "Standalone WASM debug SIMD build verified"

      - name: Run standalone WASM smoke test (debug SIMD)
        run: node tests/wasm/smoke_test.js wasm-debug-simd

      - name: Run standalone WASM debug SIMD ctest
        run: ctest --preset wasm-debug-simd

      - name: Build paired WASM debug artifacts
        run: ./scripts/build_wasm_paired.sh wasm-debug-paired

      - name: Verify paired WASM debug output
        run: |
          test -f build/examples/hello/wasm-debug-paired/index.html
          test -f build/examples/hello/wasm-debug-paired/index.js
          test -f build/examples/hello/wasm-debug-paired/index.wasm
          test -f build/examples/hello/wasm-debug-paired/index_simd.wasm
          test -f build/engine/wasm-debug-paired/libnt_core.a
          test -f build/engine/wasm-debug-paired/libnt_log.a
          test -f build/engine/wasm-debug-paired/libnt_log_stub.a
          echo "Paired WASM debug build verified"

      - name: Run paired WASM smoke test (debug baseline shell)
        run: node tests/wasm/smoke_test.js wasm-debug-paired

      - name: Run paired WASM debug ctest
        run: ctest --preset wasm-debug-paired

      - name: Build baseline WASM release artifacts
        run: |
          emcmake cmake --preset wasm-release
          cmake --build --preset wasm-release

      - name: Verify baseline WASM release output
        run: |
          test -f build/examples/hello/wasm-release/index.html
          test -f build/examples/hello/wasm-release/index.js
          test -f build/examples/hello/wasm-release/index.wasm
          test -f build/engine/wasm-release/libnt_core.a
          test -f build/engine/wasm-release/libnt_log.a
          test -f build/engine/wasm-release/libnt_log_stub.a
          echo "Baseline WASM release build verified"

      - name: Run baseline WASM smoke test (release)
        run: node tests/wasm/smoke_test.js wasm-release

      - name: Run baseline WASM release ctest
        run: ctest --preset wasm-release

      - name: Build paired WASM release artifacts
        run: ./scripts/build_wasm_paired.sh wasm-release-paired

      - name: Verify paired WASM release output
        run: |
          test -f build/examples/hello/wasm-release-paired/index.html
          test -f build/examples/hello/wasm-release-paired/index.js
          test -f build/examples/hello/wasm-release-paired/index.wasm
          test -f build/examples/hello/wasm-release-paired/index_simd.wasm
          test -f build/examples/hello/wasm-release-simd/index.html
          test -f build/examples/hello/wasm-release-simd/index.js
          test -f build/examples/hello/wasm-release-simd/index.wasm
          test -f build/engine/wasm-release-paired/libnt_core.a
          test -f build/engine/wasm-release-paired/libnt_log.a
          test -f build/engine/wasm-release-paired/libnt_log_stub.a
          test -f build/engine/wasm-release-simd/libnt_core.a
          test -f build/engine/wasm-release-simd/libnt_log.a
          test -f build/engine/wasm-release-simd/libnt_log_stub.a
          echo "Paired WASM release build verified"

      - name: Run paired WASM smoke test (release baseline shell)
        run: node tests/wasm/smoke_test.js wasm-release-paired

      - name: Run standalone WASM smoke test (release SIMD)
        run: node tests/wasm/smoke_test.js wasm-release-simd

      - name: Run paired WASM release ctest
        run: ctest --preset wasm-release-paired

      - name: Run standalone WASM release SIMD ctest
        run: ctest --preset wasm-release-simd

      - name: Build paired WASM analysis artifacts
        run: ./scripts/build_wasm_paired.sh wasm-analysis-paired

      - name: Verify paired WASM analysis output
        run: |
          test -f build/examples/hello/wasm-analysis-paired/index.html
          test -f build/examples/hello/wasm-analysis-paired/index.js
          test -f build/examples/hello/wasm-analysis-paired/index.wasm
          test -f build/examples/hello/wasm-analysis-paired/index_simd.wasm
          test -f build/examples/hello/wasm-analysis-simd/index.html
          test -f build/examples/hello/wasm-analysis-simd/index.js
          test -f build/examples/hello/wasm-analysis-simd/index.wasm
          test -f build/engine/wasm-analysis-paired/libnt_core.a
          test -f build/engine/wasm-analysis-paired/libnt_log.a
          test -f build/engine/wasm-analysis-paired/libnt_log_stub.a
          test -f build/engine/wasm-analysis-simd/libnt_core.a
          test -f build/engine/wasm-analysis-simd/libnt_log.a
          test -f build/engine/wasm-analysis-simd/libnt_log_stub.a
          echo "Paired WASM analysis build verified"

      - name: Run paired WASM smoke test (analysis baseline shell)
        run: node tests/wasm/smoke_test.js wasm-analysis-paired

      - name: Run standalone WASM smoke test (analysis SIMD)
        run: node tests/wasm/smoke_test.js wasm-analysis-simd

      - name: Run paired WASM analysis ctest
        run: ctest --preset wasm-analysis-paired

      - name: Run standalone WASM analysis SIMD ctest
        run: ctest --preset wasm-analysis-simd

      - name: Verify packaged example SIMD artifacts
        run: |
          test -f build/examples/hello/wasm-debug-paired/index_simd.wasm
          test -f build/examples/bench_shapes/wasm-debug-paired/index_simd.wasm
          test -f build/examples/spinning_cube/wasm-debug-paired/index_simd.wasm
          test -f build/examples/textured_quad/wasm-debug-paired/index_simd.wasm
          test -f build/examples/sponza/wasm-debug-paired/index_simd.wasm
          test -f build/examples/hello/wasm-release-paired/index_simd.wasm
          test -f build/examples/bench_shapes/wasm-release-paired/index_simd.wasm
          test -f build/examples/spinning_cube/wasm-release-paired/index_simd.wasm
          test -f build/examples/textured_quad/wasm-release-paired/index_simd.wasm
          test -f build/examples/sponza/wasm-release-paired/index_simd.wasm
          test -f build/examples/hello/wasm-analysis-paired/index_simd.wasm
          test -f build/examples/bench_shapes/wasm-analysis-paired/index_simd.wasm
          test -f build/examples/spinning_cube/wasm-analysis-paired/index_simd.wasm
          test -f build/examples/textured_quad/wasm-analysis-paired/index_simd.wasm
          test -f build/examples/sponza/wasm-analysis-paired/index_simd.wasm
          echo "Packaged example SIMD artifacts verified"

  native:
    name: Native Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y clang ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libgl-dev xvfb

      - name: Configure native debug
        run: cmake --preset native-debug

      - name: Build native debug
        run: cmake --build --preset native-debug --target build_tq_packs

      - name: Build asset packs (textured_quad)
        run: ./build/examples/textured_quad/native-debug/build_tq_packs build/examples/textured_quad

      - name: Build sponza pack builder
        run: cmake --build --preset native-debug --target build_sponza_packs

      - name: Build asset packs (sponza)
        run: ./build/examples/sponza/native-debug/build_sponza_packs build/examples/sponza

      - name: Build native debug (all targets)
        run: cmake --build --preset native-debug

      - name: Verify native debug output
        run: |
          test -f build/tools/builder/native-debug/builder
          test -f build/engine/native-debug/libnt_core.a
          test -f build/engine/native-debug/libnt_log.a
          test -f build/engine/native-debug/libnt_log_stub.a
          echo "Native debug build verified"

      - name: Smoke test builder (debug)
        run: ./build/tools/builder/native-debug/builder

      - name: Run tests
        run: xvfb-run ctest --preset native-debug

      - name: Configure native release
        run: cmake --preset native-release

      - name: Build native release
        run: cmake --build --preset native-release

      - name: Build asset packs (textured_quad, release)
        run: ./build/examples/textured_quad/native-release/build_tq_packs build/examples/textured_quad

      - name: Build asset packs (sponza, release)
        run: ./build/examples/sponza/native-release/build_sponza_packs build/examples/sponza

      - name: Rebuild native release (with packs)
        run: cmake --build --preset native-release

      - name: Verify native release output
        run: |
          test -f build/tools/builder/native-release/builder
          test -f build/engine/native-release/libnt_core.a
          test -f build/engine/native-release/libnt_log.a
          test -f build/engine/native-release/libnt_log_stub.a
          echo "Native release build verified"

      - name: Smoke test builder (release)
        run: ./build/tools/builder/native-release/builder

      - name: Upload textured_quad packs
        uses: actions/upload-artifact@v4
        with:
          name: tq-packs
          path: build/examples/textured_quad/*.ntpack
          retention-days: 1

      - name: Upload sponza packs
        uses: actions/upload-artifact@v4
        with:
          name: sponza-packs
          path: build/examples/sponza/*.ntpack
          retention-days: 1

      - name: Submodule consumption test
        run: |
          cmake -S tests/submodule -B build/submodule-test \
            -DENGINE_ROOT=${{ github.workspace }} \
            -DCMAKE_C_COMPILER=clang -G Ninja
          cmake --build build/submodule-test
          ./build/submodule-test/submodule_test

  lint:
    name: Format & Tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y clang clang-tidy ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libgl-dev

      - name: Check formatting
        run: |
          find engine shared tools examples -name '*.c' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror

      - name: Configure
        run: cmake --preset native-debug

      - name: Run clang-tidy
        run: bash scripts/tidy.sh build/_cmake/native-debug

  size-track:
    name: Track Build Size
    runs-on: ubuntu-latest
    needs: native
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Download textured_quad packs
        uses: actions/download-artifact@v4
        with:
          name: tq-packs
          path: build/examples/textured_quad

      - name: Download sponza packs
        uses: actions/download-artifact@v4
        with:
          name: sponza-packs
          path: build/examples/sponza

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read emsdk version
        id: emsdk-version
        run: echo "version=$(cat .emsdk-version)" >> $GITHUB_OUTPUT

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ steps.emsdk-version.outputs.version }}
          actions-cache-folder: 'emsdk-cache'

      - name: Upload asset packs to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          for example_dir in build/examples/*/; do
            example_name=$(basename "$example_dir")
            for pack in "$example_dir"*.ntpack; do
              [ -f "$pack" ] || continue
              name=$(basename "$pack")
              echo "Uploading $example_name/$name to R2..."
              aws s3 cp "$pack" "s3://neotolis-assets/$example_name/$name" \
                --endpoint-url "$R2_ENDPOINT" \
                --no-progress \
                --content-type application/octet-stream \
                --cache-control "public, max-age=31536000, immutable"
            done
          done

      - name: Configure WASM release
        run: emcmake cmake --preset wasm-release -DNT_CDN_URL="https://cdn.neotolis-engine.dev"

      - name: Build WASM release
        run: cmake --build --preset wasm-release

      - name: Measure sizes (all examples)
        run: |
          for example in hello bench_shapes spinning_cube textured_quad sponza; do
            bash scripts/size.sh $example --json > /tmp/size_${example}.json
          done

      - name: Install wabt
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Configure WASM analysis
        run: emcmake cmake --preset wasm-analysis

      - name: Build WASM analysis
        run: cmake --build --preset wasm-analysis

      - name: Generate size reports (all examples)
        run: |
          for example in hello bench_shapes spinning_cube textured_quad sponza; do
            bash scripts/size-report.sh $example | tee /tmp/report_${example}.txt
          done

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-data
        continue-on-error: true

      - name: Ensure gh-pages data directory exists
        run: mkdir -p gh-pages-data/sizes

      - name: Update size history and reports (all examples)
        run: |
          for example in hello bench_shapes spinning_cube textured_quad sponza; do
            mkdir -p "gh-pages-data/reports/$example"
            cp "/tmp/report_${example}.txt" "gh-pages-data/reports/$example/size-report.txt"

            TARGET_FILE="gh-pages-data/sizes/${example}.json"
            ENTRY=$(cat "/tmp/size_${example}.json")
            if [ -f "$TARGET_FILE" ]; then
              jq --argjson e "$ENTRY" '. += [$e]' "$TARGET_FILE" > /tmp/updated.json
              mv /tmp/updated.json "$TARGET_FILE"
            else
              echo "[$ENTRY]" > "$TARGET_FILE"
            fi
          done

      - name: Check for size regression
        run: |
          for example in hello bench_shapes spinning_cube textured_quad sponza; do
            TARGET_FILE="gh-pages-data/sizes/${example}.json"
            [ -f "$TARGET_FILE" ] || continue
            ENTRIES=$(jq length "$TARGET_FILE")
            if [ "$ENTRIES" -gt 1 ]; then
              # Check engine size regression
              PREV_ENGINE=$(jq '.[-2].engine.raw // .[-2].total.raw' "$TARGET_FILE")
              CURR_ENGINE=$(jq '.[-1].engine.raw' "$TARGET_FILE")
              if [ "$PREV_ENGINE" -gt 0 ]; then
                GROWTH=$(( (CURR_ENGINE - PREV_ENGINE) * 100 / PREV_ENGINE ))
                if [ "$GROWTH" -gt 10 ]; then
                  echo "::warning::${example}: engine size grew by ${GROWTH}% (${PREV_ENGINE}B -> ${CURR_ENGINE}B)"
                else
                  echo "${example}: engine size change ${GROWTH}% (${PREV_ENGINE}B -> ${CURR_ENGINE}B)"
                fi
              fi
              # Check total size regression
              PREV_TOTAL=$(jq '.[-2].total.raw' "$TARGET_FILE")
              CURR_TOTAL=$(jq '.[-1].total.raw' "$TARGET_FILE")
              if [ "$PREV_TOTAL" -gt 0 ]; then
                GROWTH=$(( (CURR_TOTAL - PREV_TOTAL) * 100 / PREV_TOTAL ))
                if [ "$GROWTH" -gt 10 ]; then
                  echo "::warning::${example}: total size grew by ${GROWTH}% (${PREV_TOTAL}B -> ${CURR_TOTAL}B)"
                else
                  echo "${example}: total size change ${GROWTH}% (${PREV_TOTAL}B -> ${CURR_TOTAL}B)"
                fi
              fi
            fi
          done

      - name: Preserve old size chart page
        run: |
          if [ -f "gh-pages-data/index.html" ] && ! [ -d "gh-pages-data/_astro" ]; then
            mkdir -p gh-pages-data/sizes
            cp gh-pages-data/index.html gh-pages-data/sizes/index.html
          fi

      - name: Copy WASM examples to gh-pages
        run: |
          for example_dir in build/examples/*/wasm-release; do
            example_name=$(basename $(dirname "$example_dir"))
            mkdir -p "gh-pages-data/wasm/$example_name"
            cp "$example_dir"/*.html "$example_dir"/*.js "$example_dir"/*.wasm "gh-pages-data/wasm/$example_name/"
          done

      - name: Copy example cover images
        run: |
          for promo_dir in examples/*/site_promo; do
            example_name=$(basename $(dirname "$promo_dir"))
            if [ -f "$promo_dir/cover.png" ]; then
              mkdir -p "gh-pages-data/examples/$example_name"
              cp "$promo_dir/cover.png" "gh-pages-data/examples/$example_name/cover.png"
            fi
          done

      - name: Build promo site
        run: |
          cd neotolis-engine-site
          npm install
          npm run build

      - name: Copy site to deploy directory
        run: cp -r neotolis-engine-site/dist/* gh-pages-data/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy gh-pages-data --project-name=neotolis-engine --branch=main

      - name: Prepare size data for persistence
        run: |
          mkdir -p /tmp/size-data
          cp -r gh-pages-data/sizes /tmp/size-data/ 2>/dev/null || true
          cp -r gh-pages-data/reports /tmp/size-data/ 2>/dev/null || true

      - name: Persist size data to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/size-data
          keep_files: true

  pr-size-comment:
    name: PR Size Comment
    runs-on: ubuntu-latest
    needs: native
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Download textured_quad packs
        uses: actions/download-artifact@v4
        with:
          name: tq-packs
          path: build/examples/textured_quad

      - name: Download sponza packs
        uses: actions/download-artifact@v4
        with:
          name: sponza-packs
          path: build/examples/sponza

      - name: Read emsdk version
        id: emsdk-version
        run: echo "version=$(cat .emsdk-version)" >> $GITHUB_OUTPUT

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ steps.emsdk-version.outputs.version }}
          actions-cache-folder: 'emsdk-cache'

      - name: Install wabt
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Build baseline WASM release artifacts
        run: |
          emcmake cmake --preset wasm-release
          cmake --build --preset wasm-release

      - name: Verify baseline WASM release output
        run: |
          test -f build/examples/hello/wasm-release/index.html
          test -f build/examples/hello/wasm-release/index.js
          test -f build/examples/hello/wasm-release/index.wasm
          test -f build/engine/wasm-release/libnt_core.a
          test -f build/engine/wasm-release/libnt_log.a
          test -f build/engine/wasm-release/libnt_log_stub.a
          echo "Baseline WASM release build verified"

      - name: Run baseline WASM smoke test (release)
        run: node tests/wasm/smoke_test.js wasm-release

      - name: Run baseline WASM release ctest
        run: ctest --preset wasm-release

      - name: Build paired WASM release artifacts
        run: ./scripts/build_wasm_paired.sh wasm-release-paired

      - name: Measure sizes (all examples)
        run: |
          for example in hello bench_shapes spinning_cube textured_quad sponza; do
            bash scripts/size.sh $example --json > /tmp/size_${example}.json
          done

      - name: Configure WASM analysis
        run: emcmake cmake --preset wasm-analysis

      - name: Build WASM analysis
        run: cmake --build --preset wasm-analysis

      - name: Generate size reports (all examples)
        run: |
          for example in hello bench_shapes spinning_cube textured_quad sponza; do
            bash scripts/size-report.sh $example | tee /tmp/report_${example}.txt
          done

      - name: Fetch baseline from gh-pages
        id: baseline
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-baseline
        continue-on-error: true

      - name: Generate size comment
        run: |
          EXAMPLES="hello bench_shapes spinning_cube textured_quad sponza"
          PR_COMMIT=$(git rev-parse --short HEAD)

          # Format bytes as KB/MB with 3 decimal places
          fmt() {
            local bytes="$1"
            if [ "$bytes" -ge 1048576 ]; then
              awk "BEGIN { printf \"%.3f MB\", $bytes / 1048576 }"
            elif [ "$bytes" -ge 1024 ]; then
              awk "BEGIN { printf \"%.3f KB\", $bytes / 1024 }"
            else
              printf "%d B" "$bytes"
            fi
          }

          # Format delta: +/- with KB/MB
          fmt_delta() {
            local bytes="$1"
            local abs=${bytes#-}
            local formatted
            if [ "$abs" -ge 1048576 ]; then
              formatted=$(awk "BEGIN { printf \"%.3f MB\", $abs / 1048576 }")
            elif [ "$abs" -ge 1024 ]; then
              formatted=$(awk "BEGIN { printf \"%.3f KB\", $abs / 1024 }")
            else
              formatted="${abs} B"
            fi
            [ "$bytes" -ge 0 ] && printf -- "+%s" "$formatted" || printf -- "-%s" "$formatted"
          }

          {
            echo "## WASM Build Sizes"
            echo ""

            for example in $EXAMPLES; do
              CURRENT=$(cat /tmp/size_${example}.json)
              BASELINE_FILE="gh-pages-baseline/sizes/${example}.json"
              HAS_BASELINE=false
              if [ -f "$BASELINE_FILE" ]; then
                BASELINE=$(jq '.[-1]' "$BASELINE_FILE")
                HAS_BASELINE=true
              fi

              cur_engine_raw=$(echo "$CURRENT" | jq -r '.engine.raw')
              cur_engine_gz=$(echo "$CURRENT" | jq -r '.engine.gzip')
              cur_res_raw=$(echo "$CURRENT" | jq -r '.resources.raw')
              cur_res_gz=$(echo "$CURRENT" | jq -r '.resources.gzip')
              cur_total_raw=$(echo "$CURRENT" | jq -r '.total.raw')
              cur_total_gz=$(echo "$CURRENT" | jq -r '.total.gzip')

              if [ "$HAS_BASELINE" = true ]; then
                base_engine_gz=$(echo "$BASELINE" | jq -r '.engine.gzip // 0')
                d_engine_gz=$((cur_engine_gz - base_engine_gz))
                base_total_gz=$(echo "$BASELINE" | jq -r '.total.gzip')
                d_total_gz=$((cur_total_gz - base_total_gz))
                summary_extra=" | engine $(fmt_delta $d_engine_gz) | total $(fmt_delta $d_total_gz)"
              else
                summary_extra=""
              fi

              # Build summary line: engine (+ resources if present)
              if [ "$cur_res_raw" -gt 0 ]; then
                summary_sizes="engine $(fmt $cur_engine_gz) gzip + resources $(fmt $cur_res_raw) = $(fmt $cur_total_gz) gzip"
              else
                summary_sizes="$(fmt $cur_total_gz) gzip"
              fi

              echo "<details>"
              echo "<summary><code>${example}</code> — ${summary_sizes}${summary_extra}</summary>"
              echo ""
              echo "| File | Raw | Gzip | Raw Delta | Gzip Delta |"
              echo "|------|----:|-----:|----------:|-----------:|"

              # Helper to print a file row with delta
              print_file_row() {
                local fname="$1"
                local cur_raw cur_gz d_raw_str d_gz_str
                cur_raw=$(echo "$CURRENT" | jq -r ".files[\"$fname\"].raw")
                cur_gz=$(echo "$CURRENT" | jq -r ".files[\"$fname\"].gzip")
                if [ "$HAS_BASELINE" = true ]; then
                  local base_raw base_gz d_raw d_gz
                  base_raw=$(echo "$BASELINE" | jq -r ".files[\"$fname\"].raw // 0")
                  base_gz=$(echo "$BASELINE" | jq -r ".files[\"$fname\"].gzip // 0")
                  d_raw=$((cur_raw - base_raw))
                  d_gz=$((cur_gz - base_gz))
                  d_raw_str="$(fmt_delta $d_raw)"
                  d_gz_str="$(fmt_delta $d_gz)"
                else
                  d_raw_str="--"
                  d_gz_str="--"
                fi
                printf "| \`%s\` | %s | %s | %s | %s |\n" "$fname" "$(fmt $cur_raw)" "$(fmt $cur_gz)" "$d_raw_str" "$d_gz_str"
              }

              # Engine files (not starting with assets/)
              for fname in $(echo "$CURRENT" | jq -r '.files | keys[]' | sort); do
                case "$fname" in assets/*) continue ;; esac
                print_file_row "$fname"
              done

              # Compute deltas for subtotals
              if [ "$HAS_BASELINE" = true ]; then
                base_engine_raw=$(echo "$BASELINE" | jq -r '.engine.raw // 0')
                base_res_raw=$(echo "$BASELINE" | jq -r '.resources.raw // 0')
                base_res_gz=$(echo "$BASELINE" | jq -r '.resources.gzip // 0')
                d_engine_raw=$((cur_engine_raw - base_engine_raw))
                d_engine_gz=$((cur_engine_gz - base_engine_gz))
                d_res_raw=$((cur_res_raw - base_res_raw))
                d_res_gz=$((cur_res_gz - base_res_gz))
                d_total_raw=$((cur_total_raw - $(echo "$BASELINE" | jq -r '.total.raw')))
                d_total_gz=$((cur_total_gz - base_total_gz))
              fi

              # Engine subtotal
              if [ "$HAS_BASELINE" = true ]; then
                echo "| **Engine** | **$(fmt $cur_engine_raw)** | **$(fmt $cur_engine_gz)** | **$(fmt_delta $d_engine_raw)** | **$(fmt_delta $d_engine_gz)** |"
              else
                echo "| **Engine** | **$(fmt $cur_engine_raw)** | **$(fmt $cur_engine_gz)** | **--** | **--** |"
              fi

              # Resources files + subtotal (only if resources exist)
              if [ "$cur_res_raw" -gt 0 ]; then
                for fname in $(echo "$CURRENT" | jq -r '.files | keys[]' | sort); do
                  case "$fname" in assets/*) ;; *) continue ;; esac
                  print_file_row "$fname"
                done
                if [ "$HAS_BASELINE" = true ]; then
                  echo "| **Resources** | **$(fmt $cur_res_raw)** | **$(fmt $cur_res_gz)** | **$(fmt_delta $d_res_raw)** | **$(fmt_delta $d_res_gz)** |"
                else
                  echo "| **Resources** | **$(fmt $cur_res_raw)** | **$(fmt $cur_res_gz)** | **--** | **--** |"
                fi
              fi

              # Total
              if [ "$HAS_BASELINE" = true ]; then
                echo "| **Total** | **$(fmt $cur_total_raw)** | **$(fmt $cur_total_gz)** | **$(fmt_delta $d_total_raw)** | **$(fmt_delta $d_total_gz)** |"
              else
                echo "| **Total** | **$(fmt $cur_total_raw)** | **$(fmt $cur_total_gz)** | **--** | **--** |"
              fi
              echo ""
              echo "</details>"
              echo ""
            done

            if [ -f "gh-pages-baseline/sizes/hello.json" ]; then
              base_commit=$(jq -r '.[-1].commit' "gh-pages-baseline/sizes/hello.json")
            else
              base_commit="none"
            fi
            echo "<sub>Baseline: master@${base_commit} | PR: ${PR_COMMIT}</sub>"
          } > /tmp/pr_comment.md

      - name: Post PR size comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_BODY=$(cat /tmp/pr_comment.md)
          PR_NUMBER=${{ github.event.pull_request.number }}

          gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            -X POST -f body="$COMMENT_BODY"
          echo "Created size comment"

      - name: Generate size report comment
        run: |
          EXAMPLES="hello bench_shapes spinning_cube textured_quad sponza"
          PR_COMMIT=$(git rev-parse --short HEAD)

          {
            echo "## WASM Size Reports"
            echo ""

            for example in $EXAMPLES; do
              PR_REPORT="/tmp/report_${example}.txt"
              BASE_REPORT="gh-pages-baseline/reports/${example}/size-report.txt"

              echo "<details>"

              if [ -f "$BASE_REPORT" ]; then
                echo "<summary><code>${example}</code> — Size Report Diff</summary>"
                echo ""
                echo '```diff'
                diff --unified=1000 "$BASE_REPORT" "$PR_REPORT" | tail -n +4 || true
                echo '```'
              else
                echo "<summary><code>${example}</code> — Size Report (no baseline)</summary>"
                echo ""
                echo '```'
                cat "$PR_REPORT"
                echo '```'
              fi

              echo "</details>"
              echo ""
            done

            if [ -f "gh-pages-baseline/reports/hello/size-report.txt" ]; then
              base_commit=$(head -2 "gh-pages-baseline/reports/hello/size-report.txt" | grep '# Commit:' | awk '{print $3}')
            else
              base_commit="none"
            fi
            echo "<sub>PR: ${PR_COMMIT} | Baseline: ${base_commit:-none}</sub>"
          } > /tmp/report_comment.md

      - name: Post size report comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_BODY=$(cat /tmp/report_comment.md)
          PR_NUMBER=${{ github.event.pull_request.number }}

          gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            -X POST -f body="$COMMENT_BODY"
          echo "Created size report comment"
