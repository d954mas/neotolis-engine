<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neotolis Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: #c0c0c0;
            margin-bottom: 16px;
            font-size: 1.4em;
            font-weight: 400;
        }

        canvas {
            border: 1px solid #333;
            background-color: #0f0f23;
            display: block;
            margin-bottom: 16px;
        }

        #output {
            width: 800px;
            max-width: 100%;
            background-color: #0f0f23;
            border: 1px solid #333;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 200px;
            color: #b0b0b0;
        }
    </style>
</head>
<body>
    <h1>Neotolis Engine</h1>
    <canvas id="canvas" width="800" height="600" oncontextmenu="event.preventDefault()"></canvas>
    <div id="output"></div>

    <script>
        var Module = {
            canvas: (function() {
                return document.getElementById('canvas');
            })(),
            print: function(text) {
                var el = document.getElementById('output');
                if (el) {
                    el.innerHTML += text + '\n';
                    el.scrollTop = el.scrollHeight;
                }
                console.log(text);
            },
            printErr: function(text) {
                var el = document.getElementById('output');
                if (el) {
                    el.innerHTML += '<span style="color:#e06060">' + text + '</span>\n';
                    el.scrollTop = el.scrollHeight;
                }
                console.error(text);
            }
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
